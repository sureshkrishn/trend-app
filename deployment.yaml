apiVersion: apps/v1
kind: Deployment
metadata:
  name: trend-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: trend
  template:
    metadata:
      labels:
        app: trend
    spec:
      containers:
      - name: trend-container
        image: sureshkrishn/trend-app:v3000  # New image tag
        ports:
        - containerPort: 3000              # Now matches nginx
